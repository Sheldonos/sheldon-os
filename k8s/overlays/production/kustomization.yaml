apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sheldon-os

bases:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml

configMapGenerator:
  - name: sheldon-os-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - MAX_AGENTS=100

images:
  - name: ghcr.io/sheldon-os/sheldon-os
    newTag: v1.0.0

