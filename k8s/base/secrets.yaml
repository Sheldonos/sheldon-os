apiVersion: v1
kind: Secret
metadata:
  name: sheldon-os-secrets
  namespace: sheldon-os
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  database-url: "postgresql://user:password@postgres:5432/sheldon_os"
  db-user: "sheldon_os_user"
  db-password: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis credentials
  redis-url: "redis://redis:6379/0"
  redis-password: "CHANGE_ME_IN_PRODUCTION"
  
  # API Keys (replace with actual values)
  secret-key: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_RANDOM_KEY"
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_RANDOM_KEY"
  
  # External Service API Keys
  openai-api-key: "CHANGE_ME"
  anthropic-api-key: "CHANGE_ME"
  
  # Monitoring
  grafana-admin-password: "CHANGE_ME_IN_PRODUCTION"
  
---
apiVersion: v1
kind: Secret
metadata:
  name: sheldon-os-tls
  namespace: sheldon-os
type: kubernetes.io/tls
data:
  # TLS certificate and key (base64 encoded)
  # Generate with: kubectl create secret tls sheldon-os-tls --cert=path/to/cert --key=path/to/key
  tls.crt: ""
  tls.key: ""

