apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sheldon-os

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app: sheldon-os
  managed-by: kustomize

images:
  - name: ghcr.io/sheldon-os/sheldon-os
    newTag: latest

