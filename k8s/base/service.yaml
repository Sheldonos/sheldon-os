apiVersion: v1
kind: Service
metadata:
  name: sheldon-os
  namespace: sheldon-os
  labels:
    app: sheldon-os
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: sheldon-os
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: metrics
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: sheldon-os-headless
  namespace: sheldon-os
  labels:
    app: sheldon-os
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: sheldon-os
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: http

