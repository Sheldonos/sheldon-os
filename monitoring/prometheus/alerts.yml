groups:
- name: sheldon-os-alerts
  interval: 30s
  rules:
  # Application Alerts
  - alert: HighErrorRate
    expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
    for: 5m
    labels:
      severity: critical
      component: application
    annotations:
      summary: "High error rate detected"
      description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
      runbook: "https://docs.sheldon-os.com/runbooks/high-error-rate"

  - alert: SlowResponseTime
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
    for: 10m
    labels:
      severity: warning
      component: application
    annotations:
      summary: "Slow API response time"
      description: "95th percentile response time is {{ $value }}s (threshold: 2s)"
      runbook: "https://docs.sheldon-os.com/runbooks/slow-response"

  - alert: HighMemoryUsage
    expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
    for: 5m
    labels:
      severity: warning
      component: infrastructure
    annotations:
      summary: "High memory usage"
      description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"
      runbook: "https://docs.sheldon-os.com/runbooks/high-memory"

  - alert: HighCPUUsage
    expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
    for: 5m
    labels:
      severity: warning
      component: infrastructure
    annotations:
      summary: "High CPU usage"
      description: "CPU usage is {{ $value | humanizePercentage }} (threshold: 80%)"
      runbook: "https://docs.sheldon-os.com/runbooks/high-cpu"

  # Database Alerts
  - alert: DatabaseDown
    expr: up{job="postgres"} == 0
    for: 1m
    labels:
      severity: critical
      component: database
    annotations:
      summary: "PostgreSQL database is down"
      description: "Database has been unreachable for 1 minute"
      runbook: "https://docs.sheldon-os.com/runbooks/database-down"

  - alert: DatabaseConnectionPoolExhausted
    expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
    for: 5m
    labels:
      severity: warning
      component: database
    annotations:
      summary: "Database connection pool nearly exhausted"
      description: "Connection pool usage is {{ $value | humanizePercentage }} (threshold: 80%)"
      runbook: "https://docs.sheldon-os.com/runbooks/connection-pool"

  - alert: SlowDatabaseQueries
    expr: rate(pg_stat_statements_mean_exec_time[5m]) > 1000
    for: 10m
    labels:
      severity: warning
      component: database
    annotations:
      summary: "Slow database queries detected"
      description: "Average query time is {{ $value }}ms (threshold: 1000ms)"
      runbook: "https://docs.sheldon-os.com/runbooks/slow-queries"

  # Redis Alerts
  - alert: RedisDown
    expr: up{job="redis"} == 0
    for: 1m
    labels:
      severity: critical
      component: cache
    annotations:
      summary: "Redis cache is down"
      description: "Redis has been unreachable for 1 minute"
      runbook: "https://docs.sheldon-os.com/runbooks/redis-down"

  - alert: RedisMemoryHigh
    expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
    for: 5m
    labels:
      severity: warning
      component: cache
    annotations:
      summary: "Redis memory usage high"
      description: "Redis memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"
      runbook: "https://docs.sheldon-os.com/runbooks/redis-memory"

  # Agent Alerts
  - alert: TooManyActiveAgents
    expr: sheldon_os_active_agents > 100
    for: 10m
    labels:
      severity: warning
      component: agents
    annotations:
      summary: "Too many active agents"
      description: "{{ $value }} agents are active (threshold: 100)"
      runbook: "https://docs.sheldon-os.com/runbooks/too-many-agents"

  - alert: AgentFailureRateHigh
    expr: rate(sheldon_os_agent_failures_total[5m]) > 0.1
    for: 5m
    labels:
      severity: warning
      component: agents
    annotations:
      summary: "High agent failure rate"
      description: "Agent failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"
      runbook: "https://docs.sheldon-os.com/runbooks/agent-failures"

  # Infrastructure Alerts
  - alert: PodCrashLooping
    expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
    for: 5m
    labels:
      severity: critical
      component: infrastructure
    annotations:
      summary: "Pod is crash looping"
      description: "Pod {{ $labels.pod }} is restarting frequently"
      runbook: "https://docs.sheldon-os.com/runbooks/crash-loop"

  - alert: PodNotReady
    expr: kube_pod_status_phase{phase!="Running"} > 0
    for: 10m
    labels:
      severity: warning
      component: infrastructure
    annotations:
      summary: "Pod not ready"
      description: "Pod {{ $labels.pod }} has been not ready for 10 minutes"
      runbook: "https://docs.sheldon-os.com/runbooks/pod-not-ready"

  - alert: DiskSpaceLow
    expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.2
    for: 5m
    labels:
      severity: warning
      component: infrastructure
    annotations:
      summary: "Low disk space"
      description: "Disk space is {{ $value | humanizePercentage }} available (threshold: 20%)"
      runbook: "https://docs.sheldon-os.com/runbooks/low-disk-space"

  # Business Metrics Alerts
  - alert: LowAPIUsage
    expr: rate(http_requests_total[1h]) < 10
    for: 30m
    labels:
      severity: info
      component: business
    annotations:
      summary: "Unusually low API usage"
      description: "API request rate is {{ $value }} req/s (expected: >10 req/s)"
      runbook: "https://docs.sheldon-os.com/runbooks/low-usage"

  - alert: HighAPIUsage
    expr: rate(http_requests_total[5m]) > 1000
    for: 5m
    labels:
      severity: info
      component: business
    annotations:
      summary: "Unusually high API usage"
      description: "API request rate is {{ $value }} req/s (may indicate attack or viral growth)"
      runbook: "https://docs.sheldon-os.com/runbooks/high-usage"

# Made with Bob
